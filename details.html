<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Details - AI Trend Pulse</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Back to Dashboard
            </a>
            <div class="logo">CREATOR INSIGHTS</div>
        </header>

        <section id="creator-hero" class="hero animate-fade">
            <h1 id="channel-name">-</h1>
            <p id="channel-desc">-</p>
        </section>

        <!-- Popular Highlight -->
        <div id="popular-section" class="popular-section animate-fade" style="display:none;">
            <h2 class="section-title">🔥 Most Popular Insight (인기 분석)</h2>
            <div id="popular-card-container"></div>
        </div>

        <div class="controls-bar animate-fade">
            <button class="btn-pill active" onclick="setSort('newest')">최신순</button>
            <button class="btn-pill" onclick="setSort('popular')">인기순</button>
        </div>

        <h2 class="section-title">Video Analysis (영상별 상세 분석)</h2>
        <div id="video-list" class="video-list animate-fade">
            <!-- Dynamic Content -->
        </div>
    </div>

    <script src="dashboard.js?v=2"></script>
    <script>
        const channelId = window.location.hash.substring(1);
        let currentSort = 'newest';
        let allVideos = [];

        console.log("Loading details for Channel ID:", channelId);

        async function loadDetails() {
            if (!channelId) {
                console.error("No Channel ID found in URL!");
                document.getElementById('channel-name').textContent = "Channel ID missing!";
                return;
            }

            try {
                const channels = window.CHANNELS_DATA;
                const trends = window.TRENDS_DATA;
                
                console.log("Data loaded:", { channels, trends });
                
                const channel = channels.find(c => c.id === channelId);
                allVideos = trends.channelsData[channelId] || [];

                if (channel) {
                    document.getElementById('channel-name').textContent = channel.name;
                    document.getElementById('channel-desc').textContent = channel.description;
                    document.title = `${channel.name} - AI Trend Pulse`;
                }

                renderPopular(allVideos);
                renderVideos();
            } catch (err) {
                console.error("Error in loadDetails:", err);
                document.getElementById('channel-name').textContent = "Error loading data.";
            }
        }

        function renderPopular(videos) {
            if (videos.length === 0) return;
            const popular = [...videos].sort((a,b) => b.viewCount - a.viewCount)[0];
            const container = document.getElementById('popular-card-container');
            document.getElementById('popular-section').style.display = 'block';
            
            container.innerHTML = `
                <div class="popular-card">
                    <div class="popular-badge">Top Trend</div>
                    <div class="popular-info">
                        <span class="stat-badge">조회수 ${popular.viewCount.toLocaleString()}회</span>
                        <h3>${popular.title}</h3>
                        <p style="margin-top:1rem; color:var(--text-secondary)">${popular.summary}</p>
                        <a href="${popular.url}" target="_blank" class="yt-btn">영상 보기 (YouTube)</a>
                    </div>
                    <div class="insight-box">
                        <h4 style="color:var(--accent-blue); margin-bottom:0.5rem;">KOREAN INSIGHT</h4>
                        <p>${popular.insight}</p>
                    </div>
                </div>
            `;
        }

        function setSort(type) {
            currentSort = type;
            document.querySelectorAll('.btn-pill').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === (type === 'newest' ? '최신순' : '인기순'));
            });
            renderVideos();
        }

        function renderVideos() {
            const listEl = document.getElementById('video-list');
            listEl.innerHTML = '';
            
            const sorted = [...allVideos].sort((a,b) => {
                if (currentSort === 'newest') return new Date(b.publishedAt) - new Date(a.publishedAt);
                return b.viewCount - a.viewCount;
            });

            sorted.forEach(v => {
                const date = new Date(v.publishedAt).toLocaleDateString('ko-KR');
                listEl.innerHTML += `
                    <div class="video-item animate-fade">
                        <div class="video-meta">
                            <h4>${date}</h4>
                            <div class="stat-badge">VIEWS: ${v.viewCount.toLocaleString()}</div>
                            <a href="${v.url}" target="_blank" class="yt-btn" style="font-size:0.7rem; padding:0.4rem 0.8rem;">YouTube →</a>
                        </div>
                        <div class="video-content">
                            <h3>${v.title}</h3>
                            <p style="color:var(--text-secondary); margin-bottom:1rem;">${v.summary}</p>
                            <div class="video-insight">
                                <strong>Insight:</strong> ${v.insight}
                            </div>
                            <ul class="key-points">
                                ${v.keyPoints.map(p => `<li>${p}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                `;
            });
        }
        
        if (channelId) loadDetails();
    </script>
</body>
</html>
